spring:
  application:
    name: report-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/banquito}

server:
  port: ${SERVER_PORT:8088}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

banquito:
  reports:
    storage-path: ${REPORT_STORAGE_PATH:./reports}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3003,http://localhost:5173,http://localhost:8010}
  notification:
    grpc-host: ${NOTIFICATION_GRPC_HOST:localhost}
    grpc-port: ${NOTIFICATION_GRPC_PORT:9092}
    grpc-enabled: ${NOTIFICATION_GRPC_ENABLED:true}
